databases:
  - name: minimarket-db
    databaseName: minimarket
    user: minimarket
    plan: free

services:
  - type: web
    name: minimarket
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: minimarket-db
          property: connectionString
