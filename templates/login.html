{% extends "base.html" %}
{% block content_full %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc">
  <div style="width:400px;padding:20px">

    <div style="text-align:center;margin-bottom:32px">
      <div style="width:56px;height:56px;background:#4f46e5;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5A.75.75 0 0114.25 13h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016 2.993 2.993 0 002.25-1.016 3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72l1.189-1.19A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72M6.75 18h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .414.336.75.75.75z"/>
        </svg>
      </div>
      <h1 style="font-size:26px;font-weight:800;color:#1e293b;margin:0">Minimarket</h1>
      <p style="color:#64748b;font-size:14px;margin-top:4px">Sistema de gestión</p>
    </div>

    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px;box-shadow:0 4px 24px rgba(0,0,0,.06)">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat,msg in msgs %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}
      {% endwith %}
      <form method="post">
        <label>Usuario</label>
        <input name="username" autofocus required placeholder="Ingresa tu usuario">
        <label style="margin-top:16px">Contraseña</label>
        <input type="password" name="password" required placeholder="••••••••">
        <button class="btn" style="width:100%;margin-top:24px;justify-content:center;padding:11px;font-size:15px">
          Ingresar al sistema
        </button>
      </form>
    </div>

    <p style="color:#94a3b8;font-size:12px;text-align:center;margin-top:20px">
      Demo: <strong>admin</strong> / admin123 · <strong>vendedor</strong> / vend123
    </p>
  </div>
</div>
{% endblock %}
